<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FORGE · BEARDOWN</title>
<link rel="icon" type="image/svg+xml" href="/static/assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/css/style.css">
<style>
  *{box-sizing:border-box}
  .fg-app{position:fixed;inset:0;display:flex;flex-direction:column;padding:10px;gap:8px;font-family:var(--mono);overflow:hidden}
  code{font-family:var(--mono);color:var(--cyan);background:#0a131c;border:1px solid var(--line);border-radius:3px;padding:0 4px}
  b{color:#eaf6f8}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:9px}

  /* top bar */
  .fg-top{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:8px 14px}
  .fg-top .fk{font-family:var(--disp);font-weight:700;letter-spacing:.16em;color:var(--cyan);font-size:15px;text-shadow:0 0 12px rgba(45,226,230,.4)}
  .fg-top .tag{font-family:var(--disp);letter-spacing:.16em;color:var(--cyan-dim);font-size:10px}
  .fg-top .spacer{flex:1}
  .fg-top .stat{color:var(--muted);font-size:11.5px} .fg-top .stat b{color:var(--text)}
  .fg-top .rec{display:flex;align-items:center;gap:6px;color:var(--amber);font-size:10.5px;letter-spacing:.1em}
  .fg-top .dot{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan)}

  /* main 3-col */
  .fg-main{flex:1 1 auto;display:grid;grid-template-columns:1fr 220px;gap:8px;min-height:0}
  .fg-app.collapsed .fg-main{grid-template-columns:1fr}
  .fg-app.collapsed .master{display:none}
  .ctrl-toggle{font-family:var(--mono);font-size:11px;background:#0a131c;border:1px solid var(--line);color:var(--cyan-dim);
    border-radius:6px;padding:5px 11px;cursor:pointer;margin-left:10px}
  .ctrl-toggle:hover{border-color:var(--cyan);color:var(--cyan)}
  .ctrl-show{position:fixed;top:14px;right:14px;z-index:20;display:none;font-family:var(--disp);font-size:15px;
    background:var(--cyan);color:#04161a;border:none;border-radius:7px;padding:6px 12px;cursor:pointer;box-shadow:0 0 14px rgba(45,226,230,.4)}
  .fg-app.collapsed ~ .ctrl-show{display:block}
  /* master control board */
  .master .rl{padding:13px 14px}
  .mc-h{font-family:var(--disp);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--cyan);margin:0 0 4px}
  .mc-sec{padding:11px 0;border-top:1px solid var(--line)}
  .mc-sec:first-of-type{border-top:none;padding-top:6px}
  .mc-label{font-family:var(--disp);font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--cyan-dim);margin-bottom:8px}
  .mc-label .n{color:var(--text);font-family:var(--mono)}
  .fg-col{display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .rl{padding:11px 13px;overflow:auto}
  .rl-h{font-family:var(--disp);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--cyan-dim);margin:0 0 7px}
  .rl-h:not(:first-child){margin-top:14px}

  /* left rail: model + metrics + example */
  .mname{font-size:12px;color:var(--cyan);word-break:break-all;margin-bottom:8px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{background:#0a131c;border:1px solid var(--line);border-radius:6px;padding:5px 8px;min-width:60px}
  .chip .v{font-family:var(--disp);font-weight:700;font-size:13px;color:var(--text)} .chip.cyan .v{color:var(--cyan)}
  .chip .l{color:var(--muted);font-size:8.5px;letter-spacing:.06em;text-transform:uppercase;margin-top:1px}
  .exbtns{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px}
  .xb{font-family:var(--mono);font-size:11px;background:#0a131c;border:1px solid var(--line);color:var(--text);border-radius:5px;padding:5px 6px;cursor:pointer}
  .xb:hover{border-color:var(--cyan);color:var(--cyan)}
  .xb.wide{grid-column:1 / -1}
  .exinfo{color:var(--muted);font-size:11px;line-height:1.5}

  /* center stage */
  .stage-wrap{display:flex;flex-direction:column;min-height:0;overflow:hidden}
  .tabs{flex:0 0 auto;display:flex;border-bottom:1px solid var(--line)}
  .tabs button{flex:1;font-family:var(--mono);background:transparent;border:none;border-right:1px solid var(--line);
    color:var(--muted);padding:8px 4px;cursor:pointer;font-size:11px;letter-spacing:.04em}
  .tabs button:last-child{border-right:none}
  .tabs button:hover{color:var(--text);background:#0a131c}
  .tabs button.on{color:#04161a;background:var(--cyan);font-weight:700}
  .stage{flex:1 1 auto;min-height:0;overflow:auto;padding:14px}
  .stage svg{width:100%;height:auto;display:block}
  .chh{font-family:var(--disp);font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--cyan-dim);margin:0 0 6px}
  .chh:not(:first-child){margin-top:14px}
  .note{color:var(--muted);font-size:10.5px;line-height:1.55;margin-top:7px}

  /* posterior bars */
  .bars{display:grid;grid-template-columns:62px 1fr 84px;gap:4px 8px;align-items:center;font-size:11.5px}
  .bars .g{color:var(--muted);text-align:right;text-transform:uppercase;letter-spacing:.04em;font-size:10px}
  .bars .track{position:relative;height:14px;background:var(--panel2);border:1px solid var(--line);border-radius:7px}
  .bars .fill{position:absolute;left:0;top:0;bottom:0;border-radius:7px}
  .bars .whisk{position:absolute;top:50%;height:10px;transform:translateY(-50%);border-left:1.5px solid var(--amber);border-right:1.5px solid var(--amber);opacity:.9}
  .bars .num{font-variant-numeric:tabular-nums;color:var(--text)} .bars .num .s{color:var(--amber);opacity:.85}
  /* sampled posterior: selector + big hist + picker list */
  .pg-sel{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .pg-name{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:.06em}
  .ridges{display:flex;flex-direction:column;gap:3px}
  .ridges .pr{display:grid;grid-template-columns:62px 1fr 84px;gap:8px;align-items:center;font-size:11.5px;
    padding:2px 4px;border-radius:6px;cursor:pointer;border:1px solid transparent}
  .ridges .pr:hover{background:#0a131c} .ridges .pr.sel{border-color:var(--line);background:#0a131c}
  .ridges .g{color:var(--muted);text-align:right;text-transform:uppercase;letter-spacing:.04em;font-size:10px}
  .ridges .ridge{background:var(--panel2);border:1px solid var(--line);border-radius:6px;overflow:hidden;height:26px}
  .ridges .num{font-variant-numeric:tabular-nums;color:var(--text)} .ridges .num .s{color:var(--amber);opacity:.85}
  .chart{width:100%;background:#070d14;border:1px solid var(--line);border-radius:8px}
  .read{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}

  /* stylized model */
  .mdl .edge{stroke:#274055;stroke-width:1.2;fill:none}
  .mdl .flow{stroke:var(--cyan);stroke-width:1.4;fill:none;stroke-dasharray:3 9;opacity:.85;animation:flow 1.1s linear infinite}
  @keyframes flow{to{stroke-dashoffset:-24}}
  .mdl .node{fill:#0d1a26;stroke:#2a4458;stroke-width:1.2}
  .mdl .node.phi{stroke:var(--cyan);fill:#06222a} .mdl .node.out{stroke:var(--amber)}
  .mdl .pulse{animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
  .mdl text{fill:#9fc7cf;font-family:var(--mono);font-size:9px}
  .mdl .lab{fill:#6f8693;font-size:8px} .mdl .ann{fill:var(--cyan-dim);font-size:8px}

  .soon{border:1px dashed var(--line);border-radius:9px;padding:15px;color:var(--muted);font-size:12px;line-height:1.65;background:#0a131c}
  .soon b{color:var(--text)} .soon .tg{color:var(--amber);font-family:var(--mono);font-size:10.5px}
  .hmc-ctrl{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:10px;font-size:11.5px;color:var(--muted)}
  .hmc-ctrl label{display:flex;align-items:center;gap:5px}
  .hmc-ctrl input{width:64px;font-family:var(--mono);font-size:12px;background:#0a131c;color:var(--text);border:1px solid var(--line);border-radius:5px;padding:4px 6px}
  .hmc-ctrl .hmc-tau{font-family:var(--mono);color:var(--cyan-dim)}
  .hmc-ctrl .xb{font-size:12px;padding:6px 14px}
  .hmc-status{font-family:var(--mono);color:var(--amber);font-size:11px}
  .hmc-prog{height:5px;background:var(--panel2);border:1px solid var(--line);border-radius:4px;overflow:hidden;margin:8px 0}
  .hmc-bar{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan-dim),var(--cyan));transition:width .05s linear}
  .read .xb{font-family:var(--mono);font-size:11px;background:#0a131c;border:1px solid var(--line);color:var(--text);border-radius:5px;padding:6px 10px;cursor:pointer}
  .read .xb:hover{border-color:var(--cyan);color:var(--cyan)}
  /* epistemic / aleatoric tags + recommendations */
  .ea-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0}
  .ea-card{border-radius:9px;padding:11px 13px;border:1px solid var(--line);background:#0a131c}
  .ea-card.epi{border-color:rgba(45,226,230,.5)} .ea-card.ale{border-color:rgba(240,165,0,.5)}
  .ea-tag{font-family:var(--disp);font-size:10px;letter-spacing:.12em}
  .ea-card.epi .ea-tag{color:var(--cyan)} .ea-card.ale .ea-tag{color:var(--amber)}
  .ea-val{font-family:var(--disp);font-weight:700;font-size:24px;margin:3px 0} .ea-val span{font-size:12px;color:var(--muted);font-weight:400}
  .ea-desc{color:var(--muted);font-size:11px;line-height:1.4}
  .ea-bar{height:9px;border-radius:5px;overflow:hidden;background:var(--amber);margin-top:6px}
  .ea-bar>div{height:100%;background:var(--cyan)}
  .ea-barlab{display:flex;justify-content:space-between;font-size:10.5px;margin-top:3px;font-family:var(--mono)}
  .rec{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:8px;margin:6px 0;font-size:13px;line-height:1.55;background:#0a131c;border:1px solid var(--line)}
  .rec-good{border-left:3px solid var(--good)} .rec-amber{border-left:3px solid var(--amber)} .rec-muted{border-left:3px solid var(--muted)}
  .rec-tag{font-family:var(--disp);font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:3px 8px;border-radius:5px;background:var(--panel2);white-space:nowrap;color:var(--cyan-dim);flex-shrink:0;margin-top:1px}

  /* right knob panel */
  .knob{margin-bottom:14px}
  .knob .kl{font-size:10px;color:var(--cyan-dim);letter-spacing:.04em;margin-bottom:5px}
  .knob.cal .kl{color:var(--amber)}
  .knob input[type=range]{width:100%;accent-color:var(--cyan)}
  .knob.cal input[type=range]{accent-color:var(--amber)}
  .knob .kv{font-family:var(--disp);font-weight:700;font-size:15px;color:var(--text);margin-top:2px}
  .kreset{font-family:var(--mono);font-size:10.5px;background:#0a131c;border:1px solid var(--line);color:var(--text);border-radius:5px;padding:5px 9px;cursor:pointer;width:100%}
  .kreset:hover{border-color:var(--amber);color:var(--amber)}
  .kdiv{height:1px;background:var(--line);margin:4px 0 13px}

  /* bottom status */
  .fg-bot{flex:0 0 auto;padding:7px 14px;display:flex;gap:16px;align-items:center;font-size:11px;color:var(--muted);flex-wrap:wrap}
  .fg-bot b{color:var(--cyan-dim)} .fg-bot .ok{color:var(--good)}
  .err{color:var(--bad);font-size:13px;padding:14px}
  .full{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13px;text-align:center;line-height:1.7;padding:20px}
</style>

<body class="page">
<div class="fg-app">
  <div class="panel fg-top">
    <span class="dot"></span>
    <span class="fk">FORGE</span><span class="tag">// BAYESIAN HEAD · LLLA</span>
    <span class="spacer"></span>
    <span class="stat" id="topStat"></span>
    <button class="ctrl-toggle" id="ctrlToggle" title="show / hide the control board — hide it to give the graphs the full width">⊞ controls</button>
    <span class="rec" id="topRec"></span>
  </div>

  <div class="fg-main" id="main">
    <div class="panel fg-col stage-wrap">
      <div class="tabs" id="tabs">
        <button data-v="overview" class="on">overview</button>
        <button data-v="post">posterior</button>
        <button data-v="model">model</button>
        <button data-v="sweep">τ-sweep</button>
        <button data-v="eigen">eigenspectrum</button>
        <button data-v="frac">data·frac</button>
        <button data-v="report">report</button>
        <button data-v="hmc">HMC</button>
      </div>
      <div class="stage" id="stage"><div class="full">loading the last-layer Laplace…</div></div>
    </div>
    <div class="panel fg-col master" id="master"><div class="rl" id="board"></div></div>
  </div>

  <div class="panel fg-bot" id="status"></div>
</div>
<button id="ctrlShow" class="ctrl-show" title="show the control board">⊞</button>

<script>
const $=(s,r=document)=>r.querySelector(s);
const GENRE_C={blues:"#2de2e6",classical:"#39d98a",country:"#f0a500",disco:"#ff6a1a",hiphop:"#b56cff",jazz:"#5ec8ff",metal:"#ff5470",pop:"#ffd166",reggae:"#6ee7b7",rock:"#9fb3c8"};
const PI=Math.PI;
let META=null, PL=null, EX={muRaw:null,SA_diag:null}, curIdx=0, view="overview", startIdx=0, postGenre=null;

// ---- math (mirrors llla.py: probit mean + delta σ) ------------------------
const softmax=z=>{const m=Math.max(...z);const e=z.map(x=>Math.exp(x-m));const s=e.reduce((a,b)=>a+b,0);return e.map(x=>x/s);};
const vtau=(c,lam,tau)=>{let s=0;for(let i=0;i<c.length;i++)s+=c[i]/(lam[i]+tau);return s;};
function matmul(A,B){const n=A.length,k=B.length,m=B[0].length,C=Array.from({length:n},()=>new Array(m).fill(0));
  for(let i=0;i<n;i++)for(let t=0;t<k;t++){const a=A[i][t];for(let j=0;j<m;j++)C[i][j]+=a*B[t][j];}return C;}
const transpose=A=>A[0].map((_,j)=>A.map(r=>r[j]));
function prepExample(){ EX={muRaw:PL.logit_mean, SA_diag:PL.output_cov.map((r,c)=>r[c])}; }
function posteriorAt(tau,T,s){
  T=T||1; s=(s==null?1:s);
  const v=vtau(PL.eig.c,PL.eig.lam,tau), SA=PL.output_cov, C=EX.muRaw.length;
  const mu=EX.muRaw.map(u=>u/T), p=softmax(mu);
  const diag=EX.SA_diag.map(sa=>s*s*v*sa/(T*T));
  const kappa=diag.map(dd=>1/Math.sqrt(1+(PI/8)*dd));
  const mean=softmax(mu.map((u,c)=>u*kappa[c]));
  const J=Array.from({length:C},(_,c)=>Array.from({length:C},(_,i)=>(c===i?p[c]:0)-p[c]*p[i]));
  const M=matmul(matmul(J,SA),transpose(J)), scale=s*s*v/(T*T);
  const sigma=M.map((r,c)=>Math.sqrt(Math.max(scale*r[c],0)));
  return {mean,sigma,v,scale};
}
function curKnobs(){ return { tau:tauFromSlider($("#tauSlide").value), T:parseFloat($("#tempSlide").value), s:parseFloat($("#sigSlide").value) }; }
function tauFromSlider(x){const [lo,hi]=META.tau_range;return Math.exp(Math.log(lo)+(x/1000)*(Math.log(hi)-Math.log(lo)));}
function sliderFromTau(t){const [lo,hi]=META.tau_range;return 1000*(Math.log(t)-Math.log(lo))/(Math.log(hi)-Math.log(lo));}
const poly=pts=>pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");

// ---- epistemic / aleatoric decomposition (browser MC, mirrors llla.py) -----
let SWEEP=null;                 // cached data-fraction payload for current example
function chol(A){const n=A.length,L=Array.from({length:n},()=>new Array(n).fill(0));
  for(let i=0;i<n;i++)for(let j=0;j<=i;j++){let s=A[i][j];for(let k=0;k<j;k++)s-=L[i][k]*L[j][k];
    L[i][j]= i===j ? Math.sqrt(Math.max(s,1e-12)) : s/(L[j][j]||1e-9);}return L;}
const entropy=p=>{let e=0;for(const q of p){if(q>1e-12)e-=q*Math.log(q);}return e;};
function decompose(tau,T,s,S=1200){
  // predictive Gaussian N(μ, Σ_f);  Σ_f = (s²v/T²)·Σ_A,  μ = logit_mean/T
  const v=vtau(PL.eig.c,PL.eig.lam,tau), SA=PL.output_cov, C=EX.muRaw.length;
  const mu=EX.muRaw.map(u=>u/T), scale=s*s*v/(T*T);
  const L=chol(SA.map(r=>r.map(x=>x*scale)));
  let seed=987654321; const rnd=()=>{seed=(1103515245*seed+12345)&0x7fffffff;return seed/0x7fffffff;};
  const gauss=()=>{let u=0,w=0;while(!u)u=rnd();while(!w)w=rnd();return Math.sqrt(-2*Math.log(u))*Math.cos(2*PI*w);};
  const meanP=new Array(C).fill(0); let ealea=0;
  for(let n=0;n<S;n++){
    const z=Array.from({length:C},gauss);
    const f=mu.map((m,i)=>{let a=m;for(let k=0;k<=i;k++)a+=L[i][k]*z[k];return a;});
    const p=softmax(f); for(let i=0;i<C;i++)meanP[i]+=p[i]; ealea+=entropy(p);
  }
  for(let i=0;i<C;i++)meanP[i]/=S; ealea/=S;
  const total=entropy(meanP), epi=Math.max(0,total-ealea);
  return {total, aleatoric:ealea, epistemic:epi, ef: total>1e-9?epi/total:0, meanP};
}
// live recompute of a data-fraction row at τ from cached λ_f, c_f
function sweepAt(tau){
  if(!SWEEP) return null;
  return SWEEP.fractions.map(fr=>{
    let trace=0,vin=0,starved=0;
    for(let i=0;i<fr.lam.length;i++){const den=fr.lam[i]+tau; trace+=1/den; vin+=fr.c[i]/den; if(fr.lam[i]<tau)starved++;}
    return {frac:fr.frac,n:fr.n,trace,vin,starved};
  });
}

// ---- stage views ----------------------------------------------------------
// draw S posterior samples of the per-genre probability vector (seeded → stable)
function posteriorSamples(tau,T,s,S=2500){
  const v=vtau(PL.eig.c,PL.eig.lam,tau), SA=PL.output_cov, C=EX.muRaw.length;
  const mu=EX.muRaw.map(u=>u/T), scale=s*s*v/(T*T);
  const L=chol(SA.map(r=>r.map(x=>x*scale)));
  let seed=1234567; const rnd=()=>{seed=(1103515245*seed+12345)&0x7fffffff;return seed/0x7fffffff;};
  const gauss=()=>{let u=0,w=0;while(!u)u=rnd();while(!w)w=rnd();return Math.sqrt(-2*Math.log(u))*Math.cos(2*PI*w);};
  const cols=Array.from({length:C},()=>new Array(S));
  for(let n=0;n<S;n++){
    const z=Array.from({length:C},gauss);
    const f=mu.map((m,i)=>{let a=m;for(let k=0;k<=i;k++)a+=L[i][k]*z[k];return a;});
    const p=softmax(f); for(let c=0;c<C;c++)cols[c][n]=p[c];
  }
  return cols;
}
function viewPosterior(){
  const {tau,T,s}=curKnobs(), G=PL.genres, C=G.length, S=2500;
  const cols=posteriorSamples(tau,T,s,S);
  const stats=cols.map(col=>{const mean=col.reduce((a,b)=>a+b,0)/S;
    const varr=col.reduce((a,b)=>a+(b-mean)*(b-mean),0)/S; return {mean,sd:Math.sqrt(varr),varr};});
  const order=stats.map((st,i)=>[st.mean,i]).sort((a,b)=>b[0]-a[0]).map(x=>x[1]);
  if(postGenre==null||postGenre<0||postGenre>=C) postGenre=order[0];
  const gi=postGenre, st=stats[gi], col=cols[gi], color=GENRE_C[G[gi]]||"#2de2e6";

  // big auto-zoomed histogram of the selected genre
  let lo=Math.max(0,st.mean-4*st.sd), hi=Math.min(1,st.mean+4*st.sd);
  if(hi-lo<0.02){lo=Math.max(0,st.mean-0.012);hi=Math.min(1,st.mean+0.012);}
  if(hi<=lo)hi=lo+0.01;
  const BINS=46, bw=(hi-lo)/BINS, h=new Array(BINS).fill(0);
  for(const v of col){if(v<lo||v>hi)continue;let b=Math.floor((v-lo)/bw);if(b>=BINS)b=BINS-1;if(b<0)b=0;h[b]++;}
  const hm=Math.max(...h,1), W=600,H=150,pL=8,pR=8,pT=12,pB=22;
  const Xi=i=>pL+(i/(BINS-1))*(W-pL-pR), Yc=c=>(H-pB)-(c/hm)*(H-pB-pT);
  const pts=h.map((c,i)=>[Xi(i),Yc(c)]);
  const area=`M${pL},${H-pB} `+pts.map(p=>`L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ")+` L${W-pR},${H-pB} Z`;

function buildFracChart(){
  if(!SWEEP||SWEEP.error){ $("#fracSvg").outerHTML=`<div class="err">${SWEEP?SWEEP.error:"no sweep"}</div>`; return; }
  const tau=curKnobs().tau, rows=sweepAt(tau);
  const W=720,H=200,padL=46,padB=24,padT=10,padR=10;
  const X=f=>padL+f*(W-padL-padR);
  const tmax=Math.max(...rows.map(r=>r.trace)), vmax=Math.max(...rows.map(r=>r.vin));
  const Yt=v=>padT+(1-v/(tmax*1.05))*(H-padT-padB), Yv=v=>padT+(1-v/(vmax*1.05))*(H-padT-padB);
  const tracePts=rows.map(r=>[X(r.frac),Yt(r.trace)]), vinPts=rows.map(r=>[X(r.frac),Yv(r.vin)]);
  let grid=""; [0,.25,.5,.75,1].forEach(f=>{const xx=X(f);
    grid+=`<line x1="${xx}" y1="${padT}" x2="${xx}" y2="${H-padB}" stroke="#11202e"/><text x="${xx}" y="${H-9}" text-anchor="middle" fill="#5b7180" font-size="9">${(100*f)|0}%</text>`;});
  const dot=(pts,col)=>pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="${col}"/>`).join("");
  $("#fracSvg").innerHTML=`${grid}
    <path d="${poly(tracePts)}" fill="none" stroke="var(--cyan)" stroke-width="2"/>${dot(tracePts,"var(--cyan)")}
    <path d="${poly(vinPts)}" fill="none" stroke="var(--amber)" stroke-width="1.6" opacity=".85"/>${dot(vinPts,"var(--amber)")}
    <text x="${padL}" y="${padT+9}" fill="var(--cyan)" font-size="9">tr((H+τI)⁻¹) — whole weight space</text>
    <text x="${W-padR}" y="${H-padB-4}" text-anchor="end" fill="var(--amber)" font-size="9">v(φ;τ) — this example</text>`;
  // tail slope: relative drop over the last segment (75%→100%)
  const a=rows[rows.length-2].trace, b=rows[rows.length-1].trace, drop=a>1e-9?(a-b)/a:0;
  const verdict = drop>0.05 ? ["still tightening","cyan"] : ["saturated","amber"];
  $("#fracRead").innerHTML=`<span class="chip ${verdict[1]==='cyan'?'cyan':''}"><div class="v">${(100*drop).toFixed(0)}%</div><div class="l">trace drop · last 25% data</div></span>

    <span class="chip"><div class="v" style="font-size:12px">${verdict[0]}</div><div class="l">posterior at 100%</div></span>`;
}

// confusion → aleatoric floor: largest off-diagonal recall per genre
function aleatoricFloor(){
  if(!META.confusion||!META.conf_labels) return null;
  const C=META.confusion, L=META.conf_labels, pairs=[];
  for(let i=0;i<C.length;i++){let bj=-1,bv=-1;for(let j=0;j<C[i].length;j++){if(j!==i&&C[i][j]>bv){bv=C[i][j];bj=j;}}
    pairs.push({genre:L[i],into:L[bj],val:bv});}
  pairs.sort((a,b)=>b.val-a.val); return pairs;
}

async function runHMC(){

  $("#hmcStatus").textContent="sampling… (~10–20s)"; $("#hmcRun").disabled=true;
  try{
    const r=await fetch(`/api/forge/hmc?index=${curIdx}&tau=${tau}&samples=${S}&leapfrog=${L}`);
    const d=await r.json();
    if(d.error){
      $("#hmcOut").innerHTML = d.needs_y_train
        ? `<div class="soon"><span class="tg">y_train not cached</span><br><br>HMC needs the training labels. Backfill once (on your machine):<br><br><code>python -m projects.genre.src.bayes.backfill_y_train --bundle projects\\genre\\models\\beardown --config projects\\genre\\configs\\beardown.yaml</code><br><br>then press <b>run HMC</b> again.</div>`
        : `<div class="err">${d.error}</div>`;

function hmcConverged(h){

function drawHMCFrame(gi,color,n){
  const col=HMC.hmc.pred.map(p=>p[gi]);
  let lo=Math.min(...col), hi=Math.max(...col); const pad=(hi-lo)*0.15||0.02;
  lo=Math.max(0,lo-pad); hi=Math.min(1,hi+pad); if(hi<=lo)hi=lo+0.02;
  const sub=col.slice(0,n), BINS=34, bw=(hi-lo)/BINS, h=new Array(BINS).fill(0);
  for(const v of sub){if(v<lo||v>hi)continue;let b=Math.floor((v-lo)/bw);if(b>=BINS)b=BINS-1;if(b<0)b=0;h[b]++;}
  const hm=Math.max(...h,1), W=600,H=170,pL=8,pR=8,pT=12,pB=22;
  const Xi=i=>pL+(i/(BINS-1))*(W-pL-pR), Yc=c=>(H-pB)-(c/hm)*(H-pB-pT);
  const pts=h.map((c,i)=>[Xi(i),Yc(c)]);
  const area=`M${pL},${H-pB} `+pts.map(p=>`L${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ")+` L${W-pR},${H-pB} Z`;
  const xOf=v=>pL+((v-lo)/(hi-lo))*(W-pL-pR);
  const mu=HMC.llla.mean[gi], sd=Math.max(HMC.llla.sigma[gi],1e-4), NB=60, g=[];
  for(let i=0;i<NB;i++){const x=lo+(i/(NB-1))*(hi-lo);g.push([xOf(x),Math.exp(-0.5*((x-mu)/sd)**2)]);}
  const gm=Math.max(...g.map(p=>p[1]),1e-9);
  const gline=g.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+','+((H-pB)-(p[1]/gm)*(H-pB-pT)).toFixed(1)).join(' ');
  const ticks=[lo,(lo+hi)/2,hi].map(t=>`<text x="${xOf(t).toFixed(1)}" y="${H-6}" text-anchor="middle" fill="#5b7180" font-size="10">${(100*t).toFixed(1)}%</text>`).join("");
  $("#hmcSvg").innerHTML=`
    <path d="${area}" fill="${color}" opacity="0.4"/>
    <path d="${pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ')}" fill="none" stroke="${color}" stroke-width="1.5"/>
    <path d="${gline}" fill="none" stroke="var(--amber)" stroke-width="1.8" stroke-dasharray="4 3"/>
    <line x1="${xOf(HMC.hmc.mean[gi]).toFixed(1)}" y1="${pT}" x2="${xOf(HMC.hmc.mean[gi]).toFixed(1)}" y2="${H-pB}" stroke="${color}" stroke-dasharray="2 2"/>
    <line x1="${xOf(mu).toFixed(1)}" y1="${pT}" x2="${xOf(mu).toFixed(1)}" y2="${H-pB}" stroke="var(--amber)" stroke-dasharray="2 2" opacity=".7"/>
    ${ticks}`;
  if($("#hmcBar")) $("#hmcBar").style.width=(100*n/col.length).toFixed(0)+"%";
}
function animateHMC(gi,color){

// eigenspectrum + sweep builders (write into the IDs the views inject)
function buildEigenspectrum(tau){
  const lam=[...PL.eig.lam].sort((a,b)=>b-a), d=lam.length;
  const W=720,H=190,padL=44,padB=20,padT=8,padR=10;
  const x=i=>padL+(i/(d-1))*(W-padL-padR), lg=v=>Math.log10(Math.max(v,1e-8));
  const ymax=lg(lam[0]*1.3), ymin=lg(Math.min(lam[d-1],tau)*0.5), y=v=>padT+(1-(lg(v)-ymin)/(ymax-ymin))*(H-padT-padB);
  let xo=d; for(let i=0;i<d;i++){if(lam[i]<tau){xo=i;break;}}
  const hi=[],lo=[]; for(let i=0;i<d;i++){const p=[x(i),y(lam[i])];(i<xo?hi:lo).push(p);}
  if(lo.length&&hi.length)lo.unshift(hi[hi.length-1]);
  const tauY=y(tau), starved=d-xo;
  let ticks=""; for(let ee=Math.ceil(ymin);ee<=Math.floor(ymax);ee++){const yy=y(Math.pow(10,ee));
    ticks+=`<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="#11202e"/><text x="${padL-5}" y="${yy+3}" text-anchor="end" fill="#5b7180" font-size="8.5">1e${ee}</text>`;}
  $("#eigSvg").innerHTML=`${ticks}
    <rect x="${x(xo)}" y="${padT}" width="${(W-padR)-x(xo)}" height="${H-padT-padB}" fill="rgba(240,165,0,.07)"/>
    <path d="${poly(hi)}" fill="none" stroke="var(--cyan)" stroke-width="1.7"/>
    <path d="${poly(lo)}" fill="none" stroke="var(--amber)" stroke-width="1.7"/>
    <line x1="${padL}" y1="${tauY}" x2="${W-padR}" y2="${tauY}" stroke="#cfe8ec" stroke-dasharray="5 4"/>
    <text x="${W-padR}" y="${tauY-4}" text-anchor="end" fill="#cfe8ec" font-size="9.5">τ=${tau.toExponential(1)}</text>`;
  $("#eigRead").innerHTML=`<span class="chip cyan"><div class="v">${starved}<span style="font-size:10px;color:var(--muted)"> / ${d}</span></div><div class="l">data-starved dirs</div></span>
    <span class="chip"><div class="v">${(100*starved/d).toFixed(0)}%</div><div class="l">prior-led</div></span>`;
}
function buildTauSweep(){
  const {T,s}=curKnobs(), tauNow=curKnobs().tau, [lo,hi]=META.tau_range, N=80, G=PL.genres, C=G.length;
  const taus=[], sig=Array.from({length:C},()=>[]);
  for(let k=0;k<N;k++){const t=Math.exp(Math.log(lo)+(k/(N-1))*(Math.log(hi)-Math.log(lo)));taus.push(t);
    const {sigma}=posteriorAt(t,T,s); for(let c=0;c<C;c++)sig[c].push(sigma[c]);}
  const smax=Math.max(...sig.flat(),1e-6), W=720,H=200,padL=42,padB=22,padT=8,padR=10;
  const X=t=>padL+((Math.log(t)-Math.log(lo))/(Math.log(hi)-Math.log(lo)))*(W-padL-padR), Y=v=>padT+(1-v/(smax*1.05))*(H-padT-padB);
  const {mean}=posteriorAt(tauNow,T,s), ord=mean.map((m,i)=>[m,i]).sort((a,b)=>b[0]-a[0]).map(x=>x[1]), bold=new Set(ord.slice(0,2));
  let lines=""; for(let c=0;c<C;c++){const col=GENRE_C[G[c]]||"#7aa", pts=taus.map((t,k)=>[X(t),Y(sig[c][k])]);
    lines+=`<path d="${poly(pts)}" fill="none" stroke="${col}" stroke-width="${bold.has(c)?2:1}" opacity="${bold.has(c)?1:.4}"/>`;}
  const medLam=[...PL.eig.lam].sort((a,b)=>a-b)[Math.floor(PL.eig.lam.length/2)];
  let grid=""; for(let ee=Math.ceil(Math.log10(lo));ee<=Math.floor(Math.log10(hi));ee++){const xx=X(Math.pow(10,ee));
    grid+=`<line x1="${xx}" y1="${padT}" x2="${xx}" y2="${H-padB}" stroke="#11202e"/><text x="${xx}" y="${H-8}" text-anchor="middle" fill="#5b7180" font-size="8.5">1e${ee}</text>`;}
  const mx=X(Math.min(Math.max(medLam,lo),hi)), tx=X(tauNow);
  $("#sweepSvg").innerHTML=`${grid}
    <line x1="${mx}" y1="${padT}" x2="${mx}" y2="${H-padB}" stroke="var(--amber)" stroke-dasharray="3 3" opacity=".6"/>
    <text x="${mx+3}" y="${padT+9}" fill="var(--amber)" font-size="8.5">median λ</text>${lines}
    <line x1="${tx}" y1="${padT}" x2="${tx}" y2="${H-padB}" stroke="#cfe8ec" stroke-width="1.2"/>
    <text x="${tx}" y="${padT+9}" text-anchor="middle" fill="#cfe8ec" font-size="8.5">τ now</text>
    <text x="${padL-5}" y="${Y(smax)+3}" text-anchor="end" fill="#5b7180" font-size="8.5">${(100*smax).toFixed(0)}%</text>
    <text x="${padL-5}" y="${Y(0)+3}" text-anchor="end" fill="#5b7180" font-size="8.5">0</text>`;
}

// ---- status + knob labels -------------------------------------------------
function refresh(){
  if(PL){
    const {tau,T,s}=curKnobs(), v=vtau(PL.eig.c,PL.eig.lam,tau);
    const lam=PL.eig.lam, starved=lam.reduce((a,l)=>a+(l<tau?1:0),0);
    $("#tauKV").textContent=tau.toExponential(2);
    $("#tempKV").textContent=T.toFixed(2);
    $("#sigKV").textContent=s.toFixed(2)+"×";
    $("#status").innerHTML=`<span><b>τ</b> ${tau.toExponential(2)}</span><span><b>v(φ;τ)</b> ${v.toExponential(2)}</span>
      <span><b>data-starved</b> ${starved}/${lam.length}</span><span><b>example</b> #${curIdx}</span>
      <span class="ok">posterior live · matches Python core</span>`;
  }
  renderView();
}

// ---- example loading ------------------------------------------------------
async function loadExample(idx){
  HMC=null; if(hmcTimer){clearInterval(hmcTimer);hmcTimer=null;}
  try{
    PL=await (await fetch(`/api/forge/posterior?index=${idx}`)).json();
    if(PL.error){ $("#stage").innerHTML=`<div class="err">${PL.error}</div>`; return; }
    curIdx=PL.index; prepExample();
    const pred=META.genres[META.predicted[curIdx]]||"?", iv=META.input_var[curIdx];
    $("#exinfo").innerHTML=`predicts <b>${pred}</b> · input-var ${iv!=null?(+iv).toExponential(2):"—"}`;
    if($("#exNum")) $("#exNum").textContent=`#${curIdx}`;
    $("#topStat").innerHTML=`active <b>${META.bundle}</b> · example <b>#${curIdx}</b> → <b>${pred}</b>`;
    refresh();
  }catch(e){ $("#stage").innerHTML=`<div class="err">posterior load failed: ${e}</div>`; }
}

// ---- boot -----------------------------------------------------------------
async function boot(){
  try{
    META=await (await fetch("/api/forge/meta")).json();
    if(META.error){
      $("#stage").innerHTML=`<div class="full">FORGE needs an active model with cached φ + GGN.<br>Select one in the <a href="/model" style="color:var(--cyan-dim)">Model panel</a>, or train one.<br><br><span style="color:var(--bad)">${META.error}</span></div>`;
      $("#board").innerHTML=""; return;
    }
    $("#topRec").innerHTML=`<span class="dot" style="background:var(--amber);box-shadow:0 0 8px var(--amber)"></span>LLLA · CLOSED-FORM`;

    // ---- single master control board -------------------------------------
    $("#board").innerHTML=`
      <div class="mc-h">master control</div>

      <div class="mc-sec">
        <div class="mc-label">example <span class="n" id="exNum"></span></div>
        <div class="exbtns">
          <button class="xb" id="prev" title="previous example (by index)">‹ prev</button>
          <button class="xb" id="next" title="next example (by index)">next ›</button>
          <button class="xb" id="rand" title="jump to a random training example">random</button>
          <button class="xb" id="maxu" title="jump to the most epistemically uncertain example (largest input-variance)">uncertain</button>
        </div>
        <div class="exinfo" id="exinfo"></div>
      </div>

      <div class="mc-sec">
        <div class="mc-label">posterior · model knob</div>
        <div class="knob"><div class="kl" title="Prior precision. Higher τ = stronger prior, tighter posterior; lower τ = data-driven, wider. This reshapes the actual posterior.">τ · prior precision</div><input type="range" id="tauSlide" min="0" max="1000" step="1"><div class="kv" id="tauKV">—</div></div>
      </div>

      <div class="mc-sec">
        <div class="mc-label">calibration · readout only</div>
        <div class="knob cal"><div class="kl" title="Softens (T>1) or sharpens (T<1) the predictions. A display transform — does not change the posterior.">temperature</div><input type="range" id="tempSlide" min="0.25" max="4" step="0.05" value="1"><div class="kv" id="tempKV">1.00</div></div>
        <div class="knob cal"><div class="kl" title="Multiplies the predictive σ post-hoc (honesty dial). A display transform — does not change the posterior.">σ inflation</div><input type="range" id="sigSlide" min="0.5" max="3" step="0.05" value="1"><div class="kv" id="sigKV">1.00×</div></div>
        <button class="kreset" id="kreset" title="reset temperature and σ to 1, and τ to its default">reset calibration</button>
      </div>`;

    // start at most-uncertain example
    startIdx=0; if(META.input_var&&META.input_var.length) startIdx=META.input_var.map((v,i)=>[v,i]).sort((a,b)=>b[0]-a[0])[0][1];
    $("#tauSlide").value=sliderFromTau(META.tau_default);

    const reRender=()=>refresh();
    $("#tauSlide").addEventListener("input",reRender);
    $("#tempSlide").addEventListener("input",reRender);
    $("#sigSlide").addEventListener("input",reRender);
    $("#kreset").onclick=()=>{ $("#tempSlide").value=1; $("#sigSlide").value=1; $("#tauSlide").value=sliderFromTau(META.tau_default); refresh(); };
    $("#prev").onclick=()=>loadExample(Math.max(0,curIdx-1));
    $("#next").onclick=()=>loadExample(Math.min(META.n_examples-1,curIdx+1));
    $("#rand").onclick=()=>loadExample(Math.floor(Math.random()*META.n_examples));
    $("#maxu").onclick=()=>loadExample(startIdx);
    document.querySelectorAll("#tabs button").forEach(b=>b.onclick=()=>{
      document.querySelectorAll("#tabs button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on"); view=b.dataset.v; renderView();
    });
    const app=document.querySelector(".fg-app");
    const setCtrl=hide=>{ app.classList.toggle("collapsed",hide);
      $("#ctrlToggle").textContent = hide?"⊞ show controls":"⊞ controls"; };
    $("#ctrlToggle").onclick=()=>setCtrl(!app.classList.contains("collapsed"));
    $("#ctrlShow").onclick=()=>setCtrl(false);
    loadExample(startIdx);
  }catch(e){ $("#stage").innerHTML=`<div class="err">FORGE failed to load: ${e}</div>`; }
}
boot();
</script>
</body>
</html>
