<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BEARDOWN — select a model</title>
<meta name="description" content="BEARDOWN genre recognition — pick a model, enter the analysis dashboard."/>
<meta name="theme-color" content="#040207"/>
<meta name="robots" content="noindex"/>
<link rel="icon" href="/static/assets/favicon.svg" type="image/svg+xml">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#040207; --void2:#0a0610;
    --cyan:#2DD4FF; --cyan-hot:#7ff0ff; --cyan-dim:#0e6b73;
    --ember:#FF4D1F; --flame:#FF7A0D; --gold:#FFC857;
    --amber:#f0a92e; --good:#39d98a; --bad:#ff5470;
    --mono:'Share Tech Mono', ui-monospace, Consolas, monospace;
    --disp:'Orbitron', var(--mono);
    --cut:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%;background:var(--void);font-family:var(--mono);color:var(--cyan)}
  body{display:flex;flex-direction:column;overflow-x:hidden;
    background:
      radial-gradient(120% 90% at 50% 0%, rgba(45,212,255,.05), transparent 55%),
      radial-gradient(120% 90% at 50% 110%, rgba(255,77,31,.06), transparent 55%),
      var(--void)}

  .hud{user-select:none;text-transform:uppercase;letter-spacing:.2em}
  header{display:flex;justify-content:space-between;align-items:flex-start;padding:26px 30px 0}
  #brand{display:flex;flex-direction:column;gap:6px}
  #brand a{text-decoration:none}
  #brand .word{font-family:var(--disp);font-weight:900;font-size:18px;letter-spacing:.5em;
    color:#eafbff;text-shadow:0 0 16px rgba(45,212,255,.55)}
  #brand .word .o{color:var(--flame);text-shadow:0 0 16px rgba(255,122,13,.6)}
  #brand .sub{font-size:9px;color:var(--cyan-dim);letter-spacing:.32em}
  #brand .bar{width:140px;height:1px;background:linear-gradient(90deg,var(--cyan),transparent)}
  #status{text-align:right;font-size:9.5px;color:var(--cyan-dim);letter-spacing:.26em;line-height:2}
  #status b{color:var(--amber);font-weight:400}
  #status .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--flame);
    box-shadow:0 0 8px var(--flame);margin-right:7px;vertical-align:middle;animation:blip 1.6s infinite}
  @keyframes blip{0%,100%{opacity:.35}50%{opacity:1}}

  main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:36px 24px 24px;gap:30px}
  #line{text-align:center}
  #line .eye{font-size:10px;letter-spacing:.42em;color:var(--cyan-dim);text-transform:uppercase}
  #line h1{font-family:var(--disp);font-weight:700;font-size:clamp(18px,3.2vw,25px);
    letter-spacing:.3em;color:#eafbff;text-shadow:0 0 18px rgba(45,212,255,.4);
    text-transform:uppercase;margin-top:10px}
  #line .note{margin-top:8px;font-size:10px;color:var(--cyan-dim);letter-spacing:.14em}

  /* model plates */
  #bay{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,300px));gap:20px;
    width:min(1020px,94vw);justify-content:center}
  .mplate{position:relative;display:flex;flex-direction:column;gap:12px;padding:20px 18px 16px;
    cursor:pointer;text-align:left;
    background:linear-gradient(180deg,rgba(45,212,255,.07),rgba(45,212,255,.015));
    border:1px solid rgba(45,212,255,.35);
    clip-path:polygon(var(--cut) 0,100% 0,100% calc(100% - var(--cut)),calc(100% - var(--cut)) 100%,0 100%,0 var(--cut));
    transition:transform .22s ease, border-color .22s ease, background .22s ease}
  .mplate .edge{position:absolute;top:0;left:0;height:2px;width:100%;
    background:linear-gradient(90deg,var(--cyan),var(--gold));opacity:.35;
    transform:scaleX(0);transform-origin:left;transition:transform .5s ease, opacity .3s}
  .mplate:hover .edge{transform:scaleX(1);opacity:.8}
  .mplate.active{border-color:rgba(255,122,13,.85);
    background:linear-gradient(180deg,rgba(150,16,8,.24),rgba(255,122,32,.08))}
  .mplate.active .edge{transform:scaleX(1);opacity:1;box-shadow:0 0 10px rgba(255,200,87,.7)}
  .mplate:hover{transform:translateY(-3px)}
  .mk{font-size:9px;letter-spacing:.34em;color:var(--cyan-dim);text-transform:uppercase}
  .mplate.active .mk{color:var(--gold)}
  .mname{font-family:var(--disp);font-weight:900;font-size:15px;letter-spacing:.16em;
    color:#eafbff;text-transform:uppercase;text-shadow:0 0 14px rgba(45,212,255,.35);
    overflow-wrap:anywhere}
  .mnote{font-size:10px;line-height:1.6;color:var(--cyan-dim);letter-spacing:.06em;min-height:32px}
  .mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px 14px;font-size:11px}
  .mgrid .k{color:var(--cyan-dim);letter-spacing:.1em;font-size:9px;text-transform:uppercase}
  .mgrid .v{color:var(--cyan-hot)}
  .gate{margin-top:2px;font-size:9.5px;letter-spacing:.2em;text-transform:uppercase}
  .gate.pass{color:var(--good)} .gate.fail{color:var(--bad)}
  .loaded{position:absolute;top:10px;right:12px;font-size:8.5px;letter-spacing:.3em;
    color:var(--gold);text-transform:uppercase;opacity:0}
  .mplate.active .loaded{opacity:1;text-shadow:0 0 8px rgba(255,200,87,.7)}

  /* ignition bar */
  #actions{display:flex;gap:26px;align-items:center;flex-wrap:wrap;justify-content:center}
  #enter{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.32em;
    text-transform:uppercase;color:var(--void);background:linear-gradient(90deg,var(--flame),var(--gold));
    border:none;padding:13px 34px;cursor:pointer;
    clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
    filter:drop-shadow(0 0 16px rgba(255,122,13,.45));transition:filter .2s, opacity .2s}
  #enter:hover{filter:drop-shadow(0 0 26px rgba(255,200,87,.8))}
  #enter:disabled{opacity:.25;cursor:not-allowed;filter:none}
  #back{font-size:10px;letter-spacing:.28em;color:var(--cyan-dim);text-decoration:none;text-transform:uppercase}
  #back:hover{color:var(--gold)}

  #msg{min-height:16px;font-size:10px;letter-spacing:.16em;color:var(--cyan-dim);text-align:center}
  #msg.err{color:var(--bad)}

  footer{display:flex;justify-content:center;gap:38px;padding:0 24px 28px;
    font-size:9.5px;letter-spacing:.3em;text-transform:uppercase}
  footer span{color:var(--cyan-dim)}

  @media (max-width:640px){header{padding:18px 16px 0}#bay{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){
    #status .dot{animation:none}
    .mplate,.mplate .edge{transition:none}
  }
</style>
</head>
<body>

  <header class="hud">
    <div id="brand">
      <a href="https://forge-observatory.com/"><span class="word">F<span class="o">O</span>RGE</span></a>
      <div class="sub">beardown &middot; genre recognition</div>
      <div class="bar"></div>
    </div>
    <div id="status">
      <span class="dot"></span>bay 01 <b id="stat-word">online</b><br>
      <span id="stat-n">&mdash;</span> bundles on deck
    </div>
  </header>

  <main>
    <div id="line" class="hud">
      <div class="eye">beardown &middot; bay 01</div>
      <h1>Select a model</h1>
      <div class="note">the selected bundle drives every analysis module &middot; prediction &middot; posterior</div>
    </div>

    <div id="bay" role="listbox" aria-label="model bundles"><!-- plates injected --></div>

    <div id="msg" role="status"></div>

    <div id="actions">
      <a id="back" href="https://forge-observatory.com/experiments.html">&#9666; the floor</a>
      <button id="enter" disabled>Enter dashboard &#9656;</button>
    </div>
  </main>

  <footer class="hud"><span>forge-observatory &middot; bay 01 / beardown</span></footer>

<script>
/* genealogy notes — falls back gracefully for unknown bundle families */
const LORE = {
  beardown:       {mk:"MK1", note:"cfg_14 faithful reproduction — the frozen deterministic backbone FORGE attaches to."},
  beardown_rrm:   {mk:"MK2", note:"variance-weighted RRM_w selection over the CV cohort (cfg 17) — the rule cannot see test."},
  beardown_3sec:  {mk:"MK3", note:"3-second segments, majority vote to track — per-segment scores below, vote adds ~+2pts."},
};
const fmt = x => (x==null ? "&mdash;" : (x*100).toFixed(1)+"%");
let SELECTED = null, ENTRIES = [];

async function load(){
  const bay = document.getElementById('bay'), msg = document.getElementById('msg');
  try{
    const r = await fetch('/api/registry'); const j = await r.json();
    if(!r.ok || j.error) throw new Error(j.error || r.status);
    ENTRIES = j.entries || [];
    SELECTED = j.selected || (ENTRIES[0] && ENTRIES[0].id) || null;   /* server falls back to newest */
    document.getElementById('stat-n').textContent = ENTRIES.length;
    bay.innerHTML = "";
    ENTRIES.forEach(e=>{
      const s = e.summary||{}, lore = LORE[e.family] || {mk:e.family.toUpperCase(), note:""};
      const el = document.createElement('div');
      el.className = 'mplate'+(e.id===SELECTED?' active':''); el.setAttribute('role','option');
      el.tabIndex = 0; el.dataset.id = e.id;
      el.innerHTML = `
        <span class="edge"></span><span class="loaded">loaded</span>
        <div class="mk">${lore.mk} &middot; ${e.run_id||""}</div>
        <div class="mname">${e.family}</div>
        <div class="mnote">${lore.note}</div>
        <div class="mgrid">
          <div><div class="k">val acc</div><div class="v">${fmt(s.val_acc)}</div></div>
          <div><div class="k">test acc</div><div class="v">${fmt(s.test_acc)}</div></div>
          <div><div class="k">cv mean</div><div class="v">${fmt(s.cv_mean)} &plusmn; ${s.cv_std?(s.cv_std*100).toFixed(1):"&mdash;"}</div></div>
          <div><div class="k">macro F1</div><div class="v">${fmt(s.test_macro_f1)}</div></div>
        </div>
        <div class="gate ${s.passed?'pass':'fail'}">${s.passed?'gate: pass':'gate: fail'} &middot; min ${fmt(s.accept_min)}</div>`;
      el.addEventListener('click', ()=>choose(e.id));
      el.addEventListener('keydown', ev=>{ if(ev.key==='Enter'||ev.key===' ') {ev.preventDefault(); choose(e.id);} });
      bay.appendChild(el);
    });
    document.getElementById('enter').disabled = !SELECTED;
    if(!ENTRIES.length){ msg.textContent = "no bundles on deck — sync models into apps/genre/models/ and reload"; }
  }catch(err){
    document.getElementById('stat-word').textContent = "offline";
    msg.className = "err";
    msg.textContent = "registry unreachable ("+err.message+") — is the backend up?";
  }
}

async function choose(id){
  const msg = document.getElementById('msg'); msg.className=""; msg.textContent = "loading "+id+" ...";
  try{
    const r = await fetch('/api/model/select', {method:'POST',
      headers:{'Content-Type':'application/json'}, body:JSON.stringify({id})});
    const j = await r.json();
    if(!r.ok || j.error) throw new Error(j.error || r.status);
    SELECTED = j.selected || id;
    document.querySelectorAll('.mplate').forEach(p=>p.classList.toggle('active', p.dataset.id===SELECTED));
    msg.textContent = SELECTED+" loaded";
    document.getElementById('enter').disabled = false;
  }catch(err){ msg.className="err"; msg.textContent = "select failed: "+err.message; }
}

document.getElementById('enter').addEventListener('click', ()=>{ location.href = '/dashboard'; });
load();
if(["127.0.0.1","localhost"].indexOf(location.hostname)!==-1){
  document.getElementById("back").setAttribute("href","/experiments.html");
  document.querySelector("#brand a").setAttribute("href","/");
}
</script>
</body>
</html>
