# ============================================================================
# BEARDOWN — Model 1 (faithful cfg_14 reproduction, NO sweep).
# Single source of truth for the model build (HELIX config.py pattern).
# Values tagged  >>> OPEN ITEM <<<  are seeded with documented GTZAN/BEARDOWN-
# standard defaults — overwrite from the BEARDOWN report (slide_7
# original_HP_ranges.png + Appendix B). Only the numbers change; train.py and
# beardown.py are fully cfg-driven.
# Run names (must match Model-panel dots): beardown | beardown_rrm | beardown_3sec
# ============================================================================
model: beardown
run_name: beardown                 # M1
representation: fused              # 30-sec tabular ⨝ per-track mel image (the BEARDOWN dual input)
data_root: projects/genre/data/raw

split:
  mode: stratified                # BEARDOWN gtzan_eda.py split (track | naive | stratified)
  seed: 42                        # BEARDOWN's seed (track-mode default was 0)

features:
  drop_length: true               # BEARDOWN loader bans `length` -> 57 features (faithful to cfg_14)<<
  image_size: 128                 # clean log-mel native res (n_mels=128); regenerated by eda/build_spectrograms.py
  image_dir: images_mel           # images_mel/images_grey_scale (Kaggle figures) | images_mel (clean log-mel). Run build_spectrograms.py first.

# Mel recipe — used by Day-2 features.py for song drop-in. MUST match the recipe
# that built the GTZAN grey PNGs + features_30_sec.csv, or dropped songs land out
# of distribution (silent failure).  >>> OPEN ITEM: confirm n_mels/n_fft/hop <<<
mel:
  sample_rate: 22050
  n_fft: 2048
  hop_length: 512
  n_mels: 128

# cfg_14 architecture.  >>> OPEN ITEM: overwrite filters/kernels/widths/dropout/fusion from slide_7 <<<
# cfg_14 architecture — EXACT resolved values from the mk5l sweep (config.json).
# head_type was "det" (deterministic) — so this is a faithful reproduction, not just
# of the architecture but of cfg_14's actual head; LLLA replaces nothing it relied on.
arch:
  spec_cnn:
    in_ch: 1
    conv: [[32, 3], [64, 3], [128, 3]]   # Conv+BN+ReLU+2x2 maxpool, then GlobalAvgPool
    embed: 512                    # dense_units_img (cfg_14)
    dropout: 0.1882524106871173   # dropout_backbone (cfg_14)
  tab_mlp:
    in_dim: 57                    # auto-overridden by real feature count (length dropped -> 57)
    hidden: [192]                 # single Dense (dense_units_tab, cfg_14); embedding IS this layer
    embed: 192
    dropout: 0.1908397127167648   # dropout_tab (cfg_14)
  fusion: gated                   # cfg_14 fusion = gated  (z = [img ; tab*σ(W·tab)])
  head:
    penultimate: 512              # fusion_units = dense_units_img = 512 (build default)
    dropout: 0.20                 # fusion_dropout = 0.20 (build default; not swept)
  n_classes: 10

train:
  epochs: 75                      # cfg_14
  batch_size: 8
  lr: 7.367094572864616e-05       # cfg_14 (10**uniform(-3.8,-3.0) draw)
  weight_decay: 0.0               # adam, no wd in cfg_14
  optimizer: adam                 # cfg_14 (NOT adamw — that was the template default)
  early_stopping:                 # BEARDOWN hparams.yaml — monitor val, restore best weights
    monitor: val_accuracy
    patience: 4
    restore_best: true
  reduce_lr_on_plateau:           # BEARDOWN hparams.yaml
    factor: 0.5
    patience: 2
    min_lr: 1.0e-6

cv:
  folds: 3                        # GroupKFold-by-track on the TRAIN split only

paper_target:
  val_accuracy: 0.766             # cfg_14 (BEARDOWN, Herling & Attili 2025)
  accept_min: 0.75                # acceptance gate (measured on val)
