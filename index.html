<style>
  :root{
    --void:#040207; --void2:#0a0610;
    --cyan:#2DD4FF; --cyan-hot:#7ff0ff; --cyan-dim:#0e6b73;
    --ember:#FF4D1F; --flame:#FF7A0D; --gold:#FFC857; --ignite:#FFB800;
    --amber:#f0a92e; --muted:#3f6b66;
    --mono:'Share Tech Mono', ui-monospace, Consolas, monospace;
    --disp:'Orbitron', var(--mono);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--void);overflow:hidden;font-family:var(--mono);color:var(--cyan);cursor:pointer}
  #fx{position:fixed;inset:0;display:block;touch-action:none}
  #fx2{position:fixed;inset:0;z-index:6;pointer-events:none}  /* posterior layer, in front of the logo */

  /* logo: black background keyed out by screen blend, so the live flame shows through */
  #logo{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);
    width:min(300px,46vw);height:auto;mix-blend-mode:screen;pointer-events:none;z-index:5;
    filter:drop-shadow(0 0 22px rgba(45,212,255,.40)) drop-shadow(0 0 30px rgba(255,77,31,.34));
    transition:filter .25s, transform .25s, opacity .5s;}

  /* HUD */
  .hud{position:fixed;pointer-events:none;user-select:none;text-transform:uppercase;letter-spacing:.2em;z-index:6}
  #brand{top:26px;left:30px;display:flex;align-items:center;gap:14px}
  #brand .word{font-family:var(--disp);font-weight:900;font-size:18px;letter-spacing:.5em;
    color:#eafbff;text-shadow:0 0 16px rgba(45,212,255,.55)}
  #brand .word .o{color:var(--flame);text-shadow:0 0 16px rgba(255,122,13,.6)}
  #brand .stack{display:flex;flex-direction:column;gap:6px}
  #brand .sub{font-size:9px;color:var(--cyan-dim);letter-spacing:.32em}
  #brand .bar{width:140px;height:1px;background:linear-gradient(90deg,var(--cyan),transparent)}

  #status{top:26px;right:30px;text-align:right;font-size:9.5px;color:var(--cyan-dim);letter-spacing:.26em;line-height:2}
  #status b{color:var(--amber);font-weight:400}
  #status .dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--flame);
    box-shadow:0 0 8px var(--flame);margin-right:7px;vertical-align:middle;animation:blip 1.6s infinite}
  @keyframes blip{0%,100%{opacity:.35}50%{opacity:1}}

  #tagline{bottom:118px;left:0;right:0;text-align:center;font-family:var(--disp);font-weight:500;
    font-size:12px;letter-spacing:.42em;color:rgba(180,210,225,.55)}

  /* phase rail (centred, under the plate) — a light progress stepper for the pipeline */
  #rail{position:fixed;bottom:152px;left:50%;z-index:8;pointer-events:none;width:min(440px,86vw);
    opacity:0;transform:translateX(-50%) translateY(8px);transition:opacity .45s ease, transform .45s ease;
    font-family:var(--mono)}
  #rail.on{opacity:1;transform:translateX(-50%) translateY(0)}
  #rail .rtrack{position:relative;height:2px;background:rgba(45,212,255,.16);margin:0 10px}
  #rail .rfill{position:absolute;left:0;top:0;height:100%;width:0;
    background:linear-gradient(90deg,var(--cyan),var(--gold));
    box-shadow:0 0 8px rgba(127,240,255,.55);transition:width .28s linear}
  #rail .rnode{position:absolute;top:50%;width:9px;height:9px;border-radius:50%;
    transform:translate(-50%,-50%);background:#0a1016;border:1.5px solid rgba(45,212,255,.34);
    transition:background .3s, border-color .3s, box-shadow .3s}
  #rail .rnode .rl{position:absolute;top:13px;left:50%;transform:translateX(-50%);
    font-size:7.5px;letter-spacing:.1em;white-space:nowrap;color:var(--cyan-dim);transition:color .3s}
  #rail .rnode.done{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 8px rgba(45,212,255,.7)}
  #rail .rnode.done .rl{color:#9fdcea}
  #rail .rnode.active{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(255,200,87,.9)}
  #rail .rnode.active .rl{color:var(--gold)}
  #rail .rnode.active::after{content:"";position:absolute;inset:-5px;border-radius:50%;
    border:1px solid rgba(255,200,87,.6);animation:rpulse 1.1s ease-out infinite}
  @keyframes rpulse{0%{transform:scale(.6);opacity:.9}100%{transform:scale(1.8);opacity:0}}

  /* instruction / strike */
  #strike{position:fixed;bottom:60px;left:0;right:0;text-align:center;z-index:6;pointer-events:none}
  #strike .key{display:inline-flex;align-items:center;gap:14px;font-family:var(--disp);font-weight:700;
    font-size:15px;letter-spacing:.34em;color:#eafbff;pointer-events:auto;cursor:pointer;
    padding:13px 26px;border:1px solid rgba(45,212,255,.45);
    background:linear-gradient(180deg,rgba(45,212,255,.10),rgba(45,212,255,.02));
    clip-path:polygon(12px 0,100% 0,100% calc(100% - 12px),calc(100% - 12px) 100%,0 100%,0 12px);
    animation:breathe 2.4s ease-in-out infinite;text-shadow:0 0 14px rgba(45,212,255,.55);
    transition:transform .22s ease, filter .22s ease, background .22s ease, border-color .22s ease, color .22s, text-shadow .22s}
  #strike .key:hover{animation:none;color:#fff;
    border-color:rgba(255,96,32,.95);
    background:linear-gradient(180deg, rgba(150,16,8,.55) 0%, rgba(255,122,32,.88) 100%);
    transform:scale(1.07);text-shadow:0 0 30px rgba(255,96,30,.9);
    filter:saturate(2.4) brightness(1.5)
      drop-shadow(0 0 44px rgba(255,58,18,.70)) drop-shadow(0 0 16px rgba(255,180,60,.6))}
  #strike .key:hover .glyph{color:#ffd27a}
  #strike .glyph{font-size:18px;color:var(--cyan)}
  @keyframes breathe{0%,100%{opacity:.62;border-color:rgba(45,212,255,.32)}
    50%{opacity:1;border-color:rgba(45,212,255,.72);box-shadow:0 0 24px rgba(45,212,255,.20)}}

  /* overlays */
  #grain{position:fixed;inset:0;pointer-events:none;z-index:7;mix-blend-mode:screen;opacity:.5;
    background:
      radial-gradient(130% 100% at 50% 44%, transparent 52%, rgba(2,1,6,.9) 100%),
      repeating-linear-gradient(0deg, rgba(45,212,255,.02) 0 1px, transparent 1px 3px);}
  #flash{position:fixed;inset:0;pointer-events:none;z-index:20;background:#fff;opacity:0;
    transition:opacity .75s ease-out}

  /* standalone landing stub (only when ENTER_TARGET is empty) */
  #floor{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;
    background:#fff;color:#0F1F3D;font-family:Georgia,serif;text-align:center;opacity:0;transition:opacity .6s .2s;gap:10px}
  #floor.show{display:flex;opacity:1}
  #floor .eye{font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:#C67D3E}
  #floor h1{font-size:30px;font-weight:400;letter-spacing:.02em;margin:0}
  #floor p{color:#5C657A;font-family:system-ui,sans-serif;max-width:440px}
  #floor button{margin-top:14px;font:inherit;font-family:var(--mono);font-size:12px;letter-spacing:.18em;
    text-transform:uppercase;padding:9px 20px;border:1px solid #D9DCE3;background:#fff;color:#0F1F3D;cursor:pointer;border-radius:4px}
  #floor button:hover{border-color:#FF7A0D;color:#b5560a}

  @media (max-width:640px){
    #brand{left:16px;top:18px} #status{right:16px;top:18px} #brand .bar{width:90px}
    #tagline{bottom:104px;font-size:10px;letter-spacing:.3em} #strike{bottom:46px}
  }
  @media (prefers-reduced-motion:reduce){ #strike .key,#status .dot{animation:none} }
</style>
</head>

    flameW = logoW*1.42; flameH = logoW*1.72;
    // the logo plate's on-screen box, pre-scaled to the finale scale (1.06) —
    // the burn and its burning edge are confined to this.
    const r = logo.getBoundingClientRect();
    const lw = r.width||logoW, lh = r.height||logoW, s = 1.06;
    logoBox = { x: cx - lw*s/2, y: cy - lh*s/2, w: lw*s, h: lh*s };
    buildHeat();
    buildBurn();
    skRect = null;                                          // recomputed lazily in the loop
  }
  addEventListener("resize", resize); resize();
  logo.addEventListener("load", resize);                    // re-anchor once the plate decodes

  // ── fire: soft rising particle plume (no bars) ──────────────────────────
  function gauss(){ // ~N(0,1), Box-Muller (cheap)
    let u=0,v=0; while(!u)u=Math.random(); while(!v)v=Math.random();
    return Math.sqrt(-2*Math.log(u))*Math.cos(6.283185*v);
  }
  // ── pre-baked particle sprites: blit instead of allocating a gradient per
  //    particle per frame (the old hot path). Bucket each particle to the
  //    nearest palette hue; under additive blending the banding is invisible. ──
  const FIRE_PAL = [
    [255,255,235], // white-hot tip
    [255,200,87],  // gold
    [255,122,13],  // flame
    [255,77,31],   // ember
    [127,240,255], // cyan-hot (cool-left)
    [45,212,255],  // cyan
  ];
  const SPR = 64;
  const fireSprites = FIRE_PAL.map(col=>{
    const c=document.createElement("canvas"); c.width=c.height=SPR;
    const g=c.getContext("2d");
    const rg=g.createRadialGradient(SPR/2,SPR/2,0,SPR/2,SPR/2,SPR/2);
    rg.addColorStop(0, rgba(col,1)); rg.addColorStop(1, rgba(col,0));
    g.fillStyle=rg; g.fillRect(0,0,SPR,SPR);
    return c;
  });
  function nearestSprite(col){
    let bi=0,bd=1e9;
    for(let i=0;i<FIRE_PAL.length;i++){
      const p=FIRE_PAL[i], dr=col[0]-p[0], dg=col[1]-p[1], db=col[2]-p[2];
      const d=dr*dr+dg*dg+db*db; if(d<bd){bd=d;bi=i;}
    }
    return fireSprites[bi];
  }

  const FIRE_CAP = 240, EMBER_CAP = 140;     // bound worst-case particle counts
  const fire = [];
  // heat ∈ [0,1]: 0 = cold, ~0.08 = idle smolder, 1 = struck. Drives the whole fire.
  function spawnFire(heat){
    if(fire.length>=FIRE_CAP) return;
    const spread = flameW * (0.06 + 0.12*heat) * (0.6 + Math.random()*0.6);
    const ox = gauss()*spread*(0.45 + 0.55*heat);
    const u = Math.max(-1,Math.min(1, ox/(flameW*0.5)));    // -1..1 for cyan→ember tint
    const side = (u+1)/2;
    const baseY = cy + flameH*0.40;
    fire.push({
      x: cx + ox, y: baseY + Math.random()*6,
      vx: ox*0.004 + gauss()*0.10*(0.4+0.6*heat),
      vy: -(0.28 + Math.random()*(0.4 + 1.9*heat)),         // slow & low when smolder
      wob: Math.random()*6.283, wobS: 0.5+Math.random()*1.3,
      drift: (0.12 + 0.55*heat) + Math.random()*0.4,
      r: (3 + Math.random()*4) + heat*(7 + Math.random()*13), // small smolder → big fire
      side, life: 1, decay: (0.030 - 0.015*heat) + Math.random()*0.012, // short life when cold
    });
  }

  // ── sparks: sparse, longer-lived embers riding the heat ─────────────────
  const embers = [];
  function spawnEmber(burst){
    if(embers.length>=EMBER_CAP) return;
    const u = gauss()*0.5;
    embers.push({
      x: cx + u*flameW*0.42,
      y: cy + flameH*0.34,
      vx: u*0.25 + (Math.random()-0.5)*0.5,
      vy: -(0.7 + Math.random()*1.6) * (burst?2.4:1),
      life: 1, r: 1+Math.random()*2.0,
      c: mix(C.flame, C.gold, Math.random()),
    });
  }

  // ── inference resolve: 2D heatmap burn-in + prior & posterior curves ─────
  // Shared plot geometry (also used to seed the burn-in data).
  function plotGeo(){
    const w = flameW*1.9, x0 = cx - w/2;
    const amp = flameH*0.5, base = cy + flameH*0.20;
    return {w,x0,amp,base};
  }

  // Precompute the Bayesian update: a prior and a likelihood that merge into a
  // conjugate-correct posterior (precisions add, mean is precision-weighted),
  // plus draws FROM that posterior for the final phase. Rebuilt on resize.
  function buildHeat(){
    if(!flameW) return;
    const {w,x0,amp,base}=plotGeo();
    const my = base - amp*0.42;

    // prior and likelihood: asymmetric AND well separated, so they start with
    // almost no overlap and the posterior only forms once they slide together
    const prior = { mu: cx - w*0.17, sig: w*0.140 };      // broad, left-of-centre (shifted right)
    const like  = { mu: cx + w*0.20, sig: w*0.085 };       // narrow, right
    // conjugate update gives the width; force the mean to the centre (the logo's
    // horizontal middle) so the posterior resolves symmetrically in front of it
    const t0 = 1/(prior.sig*prior.sig), tL = 1/(like.sig*like.sig);
    const post = { mu: cx, sig: 1/Math.sqrt(t0+tL) };
    const pk = { prior:0.50, like:0.64, post:0.96 };       // visual peak heights (post tallest)

    // shared bin grid; each bin carries all three heights
    const nb=34, bw=w/nb, bins=[];
    for(let b=0;b<nb;b++){
      const bx=x0+(b+0.5)*bw;
      bins.push({
        bx,
        hp: Math.exp(-0.5*((bx-prior.mu)/prior.sig)**2)*pk.prior,
        hl: Math.exp(-0.5*((bx-like.mu )/like.sig )**2)*pk.like,
        hq: Math.exp(-0.5*((bx-post.mu )/post.sig )**2)*pk.post,
        bf: nb>1 ? b/(nb-1) : 0,
      });
    }

    // burn-in cloud: explores wide (around the prior), converges on the posterior
    const M=300, samples=[];
    for(let i=0;i<M;i++){
      const p=Math.random(), sp=p*p*(3-2*p);
      const mx  = prior.mu + (post.mu-prior.mu)*sp;
      const sgx = prior.sig*1.4*(1-sp) + post.sig*sp;
      const sgy = amp*0.55*(1-sp) + amp*0.34*sp;
      let y=my+gauss()*sgy; if(y>base) y=base-(y-base)*0.3;
      samples.push({x: mx+gauss()*sgx, y, r:1.4+Math.random()*2.2, at:p, fl:Math.random()*6.28});
    }

    // walker chains: start spread near the prior, drift to the posterior mode
    const chains=[], nC=3, steps=18;
    for(let c=0;c<nC;c++){
      const pts=[]; let px=prior.mu+gauss()*prior.sig*1.2, py=my+gauss()*amp*0.55;
      for(let s=0;s<steps;s++){
        const f=s/(steps-1);
        px += (post.mu-px)*0.16 + gauss()*post.sig*(2.6*(1-f)+0.5);
        py += (my-py)*0.16 + gauss()*amp*0.16*(2*(1-f)+0.3);
        if(py>base) py=base-(py-base)*0.3;
        pts.push({x:px,y:py, at:0.15 + f*0.7 + c*0.03});
      }
      chains.push(pts);
    }

    heatGrid = { bins, bw, samples, chains, my, prior, like, post };
  }

  // ── paper-burn fronts: irregular edges, confined to the logo plate ──
  function buildBurn(){
    if(!flameW || !logoBox) return;
    const b=logoBox, bcx=b.x+b.w/2, bcy=b.y+b.h/2, bdiag=Math.hypot(b.w,b.h);
    const spots=[];
    const N = 24;
    for(let i=0;i<N;i++){
      // spread across the plate; growth is clamped to the plate border at draw time
      const x = bcx + (Math.random()-0.5)*b.w*0.84;
      const y = bcy + (Math.random()-0.5)*b.h*0.84;
      const harm=[]; for(let k=1;k<=6;k++) harm.push({k, a:(0.44/k)*(0.55+Math.random()), p:Math.random()*6.283});
      const ch=[];   for(let k=1;k<=4;k++) ch.push({k, a:1/k, p:Math.random()*6.283});
      spots.push({
        x, y, dist: Math.hypot(x-bcx, y-bcy),
        r0: 2 + Math.random()*8,
        rMax: bdiag*(0.55 + Math.random()*0.30),                  // generous; the border clamp stops it
        bright: 0.5 + Math.random()*0.7,
        harm, ch, bias:Math.random()*6.283, biasA:0.22+Math.random()*0.20,
      });
    }
    // ignite from the centre outward — start time grows with distance from the logo
    const maxD = Math.max(...spots.map(s=>s.dist)) || 1;
    for(const s of spots) s.start = (s.dist/maxD)*0.42 + Math.random()*0.06;
    burnFronts = spots;
  }
  function frontRadius(f, ang){
    let n=0; for(const h of f.harm) n+=h.a*Math.sin(h.k*ang+h.p);
    n += f.biasA*Math.cos(ang - f.bias);          // push one side out (asymmetric)
    return Math.max(0.30, 1+n);
  }
  function frontHeat(f, ang){                      // 0..1 → color density along the edge
    let n=0; for(const h of f.ch) n+=h.a*Math.sin(h.k*ang+h.p);
    return 0.5+0.5*Math.tanh(n);
  }

  // ── burning edge: the overlay has burned to the image; its rectangle stays alight ──
  function drawBurningEdge(g, rect, k, t){
    if(!rect || k<=0) return;
    const {x,y,w,h}=rect, a=smooth(k);
    g.save(); g.globalCompositeOperation="lighter";
    // layered halo + hot inner line (no shadowBlur — stacked strokes)
    const ring=(lw,col,al)=>{ g.lineWidth=lw; g.strokeStyle=rgba(col,al*a); g.strokeRect(x,y,w,h); };
    ring(20, C.flame, 0.07); ring(13, C.ember, 0.13);
    ring(7,  C.ember, 0.40); ring(2.4, C.gold, 0.72);
    // flickering embers crawling the perimeter
    const per=2*(w+h), step=15, n=Math.max(1,Math.floor(per/step));
    for(let i=0;i<n;i++){
      let d=((i*step)+ (t*40)%per)%per, px, py;            // slow crawl around the edge
      if(d<w){ px=x+d; py=y; }
      else if(d<w+h){ px=x+w; py=y+(d-w); }
      else if(d<2*w+h){ px=x+w-(d-w-h); py=y+h; }
      else { px=x; py=y+h-(d-2*w-h); }
      const fl=0.55+0.45*Math.sin(t*16+i*1.7);
      g.fillStyle=rgba(mix(mix(C.ember,C.gold,0.5+0.5*Math.sin(i+t*3)),[255,255,235],0.25),(0.4+0.5*fl)*a);
      g.beginPath(); g.arc(px,py,1.6+2.4*fl,0,6.283); g.fill();
    }
    g.restore();
  }

  function drawInference(g, prog, t){
    if(prog<=0 || !heatGrid) return;
    const ctx = g;                                          // render onto the given canvas
    const {w,x0,amp,base}=plotGeo();
    const G=heatGrid, gap=Math.max(1,G.bw*0.12), bwid=G.bw-gap*2;
    const sm=x=>x<=0?0:(x>=1?1:x*x*(3-2*x));

    // ── continuous merge: both inputs slide toward the centre AND narrow onto the
    //    posterior width, while the gold posterior grows in. One smooth motion. ──
    const m = sm((prog-0.20)/0.34);                       // merge resolves early (0.20→0.54)
    const pmu = G.prior.mu + (G.post.mu-G.prior.mu)*m;    // means converge
    const lmu = G.like.mu  + (G.post.mu-G.like.mu )*m;
    const psig= G.prior.sig + (G.post.sig-G.prior.sig)*m; // widths morph to the posterior
    const lsig= G.like.sig  + (G.post.sig-G.like.sig )*m;
    const shiftL = lmu - G.like.mu;                       // histogram screen translation
    const merge = m;                                      // drives the rule fade-in
    const priorVis = 1 - 0.92*sm((m-0.72)/0.28);          // fade only once essentially merged
    const likeVis  = priorVis;
    const postVis  = sm((m-0.10)/0.72);                   // posterior grows continuously with the merge

    // baseline axis
    ctx.save(); ctx.globalCompositeOperation="lighter";
    ctx.strokeStyle=rgba([90,123,168],0.4); ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(x0,base); ctx.lineTo(x0+w,base); ctx.stroke(); ctx.restore();

    // ── burn-in: walker chains (lines) + sample cloud (dots), converging ──
    const burn = sm((prog-0.56)/0.42)*1.12;               // burn-in laid down AFTER the posterior resolves
    ctx.save(); ctx.globalCompositeOperation="lighter"; ctx.lineWidth=1;
    for(const pts of G.chains){
      let prev=null;
      for(const p of pts){
        if(burn<p.at) break;
        if(prev){ ctx.strokeStyle=rgba([175,198,222],0.16);
          ctx.beginPath(); ctx.moveTo(prev.x,prev.y); ctx.lineTo(p.x,p.y); ctx.stroke(); }
        ctx.fillStyle=rgba([205,222,240],0.5); ctx.fillRect(p.x-1.5,p.y-1.5,3,3);
        prev=p;
      }
    }
    ctx.restore();
    ctx.save(); ctx.globalCompositeOperation="lighter";
    for(const s of G.samples){
      if(burn<s.at) continue;
      const age=Math.min(1,(burn-s.at)/0.10);
      const side=Math.max(0,Math.min(1,(s.x-x0)/w));
      const flash=age<0.5?(0.5-age)/0.5:0;
      const col=mix(mix(C.cyan,C.ember,side),[255,255,235],flash*0.8);
      const tw=0.6+0.4*Math.sin(t*7+s.fl);
      const a=(0.17+0.12*tw)*age, rr=s.r*(1+flash);
      ctx.fillStyle=rgba(col,a); ctx.fillRect(s.x-rr,s.y-rr,rr*2,rr*2);
    }
    ctx.restore();

    // draws a smooth gaussian curve (filled + stroked), revealed L→R.
    // domain extends left to the gaussian's tail so a left-sitting curve (the
    // prior) isn't clipped at the plot edge.
    function curve(dist, peak, shift, color, alpha, drawProg, fillA){
      const xL=Math.min(x0, dist.mu-3.6*dist.sig), xR=x0+w, span=xR-xL;
      const N=170, end=Math.max(1,Math.floor(N*drawProg));
      const X=i=>xL+(i/N)*span, Y=x=>base-peak*amp*Math.exp(-0.5*((x-dist.mu)/dist.sig)**2);
      ctx.save(); ctx.globalCompositeOperation="lighter";
      ctx.beginPath();
      ctx.moveTo(X(0)+shift, base);
      for(let i=0;i<=end;i++){ const x=X(i); ctx.lineTo(x+shift, Y(x)); }
      ctx.lineTo(X(end)+shift, base); ctx.closePath();
      ctx.fillStyle=rgba(color, fillA); ctx.fill();
      ctx.beginPath();
      for(let i=0;i<=end;i++){ const x=X(i); i?ctx.lineTo(x+shift,Y(x)):ctx.moveTo(x+shift,Y(x)); }
      ctx.strokeStyle=rgba(color, alpha); ctx.lineWidth=2.4;
      ctx.shadowColor=rgba(color,alpha*0.7); ctx.shadowBlur=8; ctx.stroke();
      ctx.restore();
    }

    // A ── PRIOR: broad cyan curve that slides to centre AND narrows into the posterior ──
    const priorDraw = sm(prog/0.16);
    const ppeak = 0.52 + 0.34*m;                           // tightens → a touch taller as it merges
    if(priorVis>0.01) curve({mu:pmu,sig:psig}, ppeak, 0, C.cyan, 0.75*priorVis, priorDraw, 0.10*priorVis);

    // B ── LIKELIHOOD: ember histogram that slides in AND narrows toward the posterior ──
    if(likeVis>0.01){
      ctx.save(); ctx.globalCompositeOperation="lighter";   // additive → fuses with the prior
      const invd = 1/(lsig*lsig) - 1/(G.like.sig*G.like.sig);
      for(const bn of G.bins){
        const grow=sm((prog-0.10 - bn.bf*0.06)/0.18);
        const hl=bn.hl*Math.exp(-0.5*((bn.bx-G.like.mu)**2)*invd);   // live height as the width morphs
        const h=hl*amp*grow; if(h<1) continue;
        const x=bn.bx+shiftL-G.bw/2+gap;
        ctx.fillStyle=rgba(mix(C.ember,C.flame,0.30),0.22*likeVis); ctx.fillRect(x,base-h,bwid,h);
        ctx.strokeStyle=rgba(C.flame,0.85*likeVis); ctx.lineWidth=1; ctx.strokeRect(x,base-h,bwid,h);
      }
      ctx.restore();
    }

    // C ── POSTERIOR: gold product gaussian, growing continuously as the inputs merge ──
    if(postVis>0.02){
      curve(G.post, 0.96*postVis, 0, C.gold, 0.92*Math.min(1,postVis+0.10), 1, 0.20*postVis);
      const fy=base-amp*0.5, fr=amp*(0.45+0.55*postVis);
      ctx.save(); ctx.globalCompositeOperation="lighter";
      const fg=ctx.createRadialGradient(G.post.mu,fy,0,G.post.mu,fy,fr);
      fg.addColorStop(0,   rgba([255,255,242], 0.40*postVis));
      fg.addColorStop(0.4, rgba(C.gold,        0.26*postVis));
      fg.addColorStop(1,   rgba(C.flame, 0));
      ctx.fillStyle=fg; ctx.beginPath(); ctx.arc(G.post.mu,fy,fr,0,6.283); ctx.fill();
      ctx.restore();
    }

    // D ── the rule, fading in with the merge ──
    ctx.save(); ctx.globalCompositeOperation="lighter";
    ctx.font="600 13px 'Share Tech Mono', ui-monospace, monospace"; ctx.textAlign="center"; ctx.letterSpacing="1px";
    ctx.fillStyle=rgba(C.gold,0.72*merge);
    ctx.fillText("P(\u03B8|D)  \u221D  P(D|\u03B8) \u00B7 P(\u03B8)", cx, base+30);
    ctx.restore();

    // G ── legend (curve / bars / merged) ──
    const la=sm(prog/0.28);
    ctx.save(); ctx.globalCompositeOperation="lighter";
    ctx.font="600 11px 'Share Tech Mono', ui-monospace, monospace"; ctx.textAlign="left"; ctx.letterSpacing="1.5px";
    const lx=x0+6, ly=base-amp*1.18, row=17;
    ctx.strokeStyle=rgba(C.cyanHot,0.9*la); ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(lx,ly-3); ctx.lineTo(lx+15,ly-3); ctx.stroke();
    ctx.fillStyle=rgba(C.cyanHot,0.85*la); ctx.fillText("PRIOR", lx+22, ly);
    ctx.fillStyle=rgba(C.flame,0.9*la);
    ctx.fillRect(lx,ly+row-7,4,7); ctx.fillRect(lx+6,ly+row-9,4,9); ctx.fillRect(lx+12,ly+row-6,4,6);
    ctx.fillText("LIKELIHOOD", lx+22, ly+row);
    ctx.fillStyle=rgba(C.gold,0.95*la); ctx.fillRect(lx,ly+row*2-9,15,4); ctx.fillText("POSTERIOR", lx+22, ly+row*2);
    ctx.restore();
  }

  // ── reticle + rings (HELIX console echo) ────────────────────────────────
  function drawFrame(t, glow){
    ctx.save(); ctx.globalCompositeOperation="lighter";
    const R = flameW*0.96;
    for(let k=0;k<2;k++){
      const r = R*(1+k*0.34) + Math.sin(t*0.6+k)*2;
      ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2);
      ctx.strokeStyle=rgba(C.cyan,(0.10-k*0.03)+glow*0.10); ctx.lineWidth=1; ctx.stroke();
      // tick marks
      const ticks=48;
      for(let i=0;i<ticks;i++){
        if(i%4) continue;
        const a=i/ticks*Math.PI*2, c=Math.cos(a),s=Math.sin(a);
        ctx.beginPath(); ctx.moveTo(cx+c*r,cy+s*r); ctx.lineTo(cx+c*(r+5),cy+s*(r+5));
        ctx.strokeStyle=rgba(C.cyanDim||[14,107,115],.4); ctx.stroke();
      }
    }
    // crosshair
    const ch=R*1.5;
    ctx.strokeStyle=rgba(C.cyan,.07+glow*.08); ctx.lineWidth=1;
    ctx.beginPath();
    ctx.moveTo(cx-ch,cy);ctx.lineTo(cx-R*0.55,cy);ctx.moveTo(cx+R*0.55,cy);ctx.lineTo(cx+ch,cy);
    ctx.moveTo(cx,cy-ch*0.9);ctx.lineTo(cx,cy-R*0.6);ctx.moveTo(cx,cy+R*0.6);ctx.lineTo(cx,cy+ch*0.9);
    ctx.stroke(); ctx.restore();
  }

  // ── state machine ───────────────────────────────────────────────────────
  let state="idle", t0=performance.now(), igniteAt=0, heat=0;
  let hover=0, mx=-99999, my=-99999;                       // proximity "charge" before ignition
  const flash = document.getElementById("flash");
  const strikeEl = document.getElementById("strike");
  const keyEl = document.querySelector("#strike .key");
  const glyphEl = keyEl ? keyEl.querySelector(".glyph") : null;

  // ── phase rail: a light progress stepper, lit as each pipeline phase runs ──
  const railEl = document.getElementById("rail");
  const rtrack = document.getElementById("rtrack");
  const rfill  = document.getElementById("rfill");
  const PH = [   // at = seconds since ignite (phase begins)
    { name:"PRIOR",      at:0.50 },
    { name:"LIKELIHOOD", at:1.10 },
    { name:"POSTERIOR",  at:1.80 },
    { name:"BURN-IN",    at:2.90 },
    { name:"ETCH",       at:4.30 },
  ];
  const railNodes = PH.map((p,i)=>{
    const n=document.createElement("div"); n.className="rnode";
    n.style.left=(PH.length>1 ? i/(PH.length-1)*100 : 0)+"%";
    const l=document.createElement("div"); l.className="rl"; l.textContent=p.name;
    n.appendChild(l); if(rtrack) rtrack.appendChild(n); return n;
  });
  let railShown=false;
  function updateRail(e){
    if(!railEl) return;
    if(!railShown && e>0){ railEl.classList.add("on"); railShown=true; }
    let k=0; for(let i=0;i<PH.length;i++){ if(e>=PH[i].at) k=i; }
    const a=PH[k].at, b=(k<PH.length-1)?PH[k+1].at:a+1;
    const within=(k<PH.length-1)?Math.min(1,Math.max(0,(e-a)/(b-a))):0;  // last node = terminus, no overshoot
    rfill.style.width=((k+within)/(PH.length-1)*100)+"%";
    for(let i=0;i<railNodes.length;i++){
      railNodes[i].classList.toggle("done", i<k);
      railNodes[i].classList.toggle("active", i===k);
    }
  }

  function ignite(){
    if(state!=="idle") return;
    state="igniting"; igniteAt=performance.now();
    strikeEl.style.transition="opacity .3s"; strikeEl.style.opacity="0";
    logo.style.transform="translate(-50%,-50%) scale(1.06)";
    logo.style.filter="drop-shadow(0 0 40px rgba(255,184,0,.7)) drop-shadow(0 0 60px rgba(255,77,31,.6))";
    for(let i=0;i<60;i++) spawnEmber(true);
    for(let i=0;i<70;i++) spawnFire(1);
    if(navigator.vibrate) navigator.vibrate(40);
  }
  function cross(){
    state="done";
    if(ENTER_TARGET){ location.href = ENTER_TARGET; return; }
    document.getElementById("floor").classList.add("show");
  }
  document.getElementById("reignite").addEventListener("click", ()=>location.reload());

  addEventListener("keydown", e=>{
    if(e.key==="Enter"||e.key===" "){ e.preventDefault(); ignite(); }
  });
  addEventListener("pointerdown", ()=> ignite());
  ["pointermove","mousemove"].forEach(ev=>{
    const h=e=>{ if(e.pointerType!=="touch"){ mx=e.clientX; my=e.clientY; } };
    window.addEventListener(ev, h, {passive:true});
    document.addEventListener(ev, h, {passive:true});
  });
  document.addEventListener("mouseleave", ()=>{ mx=-99999; my=-99999; });

  // ── render loop ─────────────────────────────────────────────────────────
  function frame(now){
    const t=(now-t0)/1000;
    ctx.clearRect(0,0,W,H);

    // ignite progress (resolve → hold → overlay burns to the image edges → hold → cross)
    let surge=0, post=0, fin=0, edge=0;
    if(state==="igniting"){
      const e=(now-igniteAt)/1000;
      surge = Math.min(1, e/0.8);                          // flame roars up over 0.8s
      post  = Math.min(1, Math.max(0,(e-0.40)/3.5));       // prior→like→posterior→burn-in 0.40 → 3.9s
      fin   = Math.min(1, Math.max(0,(e-4.0)/3.8));        // veneer burns through slowly 4.0 → 7.5s
      edge  = Math.min(1, Math.max(0,(e-7.0)/0.5));        // plate glow rises as the burn lands
      if(e>8.0 && flash.style.opacity!=="1"){ flash.style.opacity="1"; } // burn freezes ~7.5, hold 0.5s, then wash
      if(e>8.7){ cross(); }                                // segue from the held burning edge
      if(Math.random()<0.9) spawnEmber(true);
      updateRail(e);
    }
    const breath = reduce?0.5:(0.5+0.5*Math.sin(t*1.4));

    // proximity charge — the page wakes up as the pointer nears the mark
    let hoverTarget = 0;
    if(state==="idle"){
      const d=Math.hypot(mx-cx, my-cy), R0=Math.min(W,H)*0.62;
      hoverTarget = Math.max(0, Math.min(1, 1 - d/R0));
    }
    hover += (hoverTarget - hover) * 0.08;

    // heat ramps from a low idle smolder up to full fire once struck (charge lifts the smolder)
    const heatTarget = (state==="idle") ? (0.08 + 0.40*hover) : 1;
    heat += (heatTarget - heat) * (state==="idle" ? 0.04 : 0.05);
    const dim = (1 - 0.5*post*(1-fin)) + 0.5*fin;            // flame recedes for the result, then surges back

    // logo charges up as you approach the mark (idle only)
    if(state==="idle"){
      logo.style.transform = `translate(-50%,-50%) scale(${(1+0.03*hover).toFixed(3)})`;
      logo.style.filter =
        `drop-shadow(0 0 ${(22+50*hover)|0}px rgba(45,212,255,${(0.40+0.45*hover).toFixed(2)})) `
       +`drop-shadow(0 0 ${(30+70*hover)|0}px rgba(255,77,31,${(0.34+0.50*hover).toFixed(2)}))`;
    }

    // ENTER key: native :hover does the blue→magma morph; JS just sheds embers off it
    if(!skRect && keyEl) skRect = keyEl.getBoundingClientRect();
    const keyHot = (state==="idle" && keyEl && keyEl.matches(":hover"));
    strikeHover += ((keyHot?1:0) - strikeHover) * 0.15;
    if(keyHot && skRect && strikeHover>0.4 && embers.length<EMBER_CAP && Math.random()<strikeHover*0.5){
      embers.push({x:skRect.left+Math.random()*skRect.width, y:skRect.top+skRect.height*0.45,
        vx:(Math.random()-0.5)*0.6, vy:-0.8-Math.random()*0.9, life:1, r:1.4+Math.random()*2.1,
        c:mix(C.flame,C.gold,Math.random())});
    }

    const burnProg = smooth(Math.min(1, fin/0.92));         // drives the paper burn-off

    // logo: opaque true colours as the burn reveals it; steady warm glow, edges catch at the end
    if(fin>0){
      logo.style.mixBlendMode = "normal";
      logo.style.transform = `translate(-50%,-50%) scale(1.06)`;   // hold steady — no expand
      const glow = Math.min(1, 0.45 + 0.55*burnProg + 0.30*edge);
      logo.style.filter =
        `drop-shadow(0 0 ${(26+90*burnProg+30*edge)|0}px rgba(255,184,0,${glow.toFixed(2)})) `
       +`drop-shadow(0 0 ${(46+120*burnProg+40*edge)|0}px rgba(255,77,31,${glow.toFixed(2)}))`;
    }

    drawFrame(t, surge + hover*0.5);

    // ── heat body: soft breathing flame aura (cool-left, hot-right) ──
    ctx.save(); ctx.globalCompositeOperation="lighter";
    const heatGlow = (0.10 + 0.90*heat) * dim;               // faint low glow when smoldering
    const dxk = 0.4 + 0.6*heat;                              // lobes tighten when cold
    const by = cy + flameH*(0.30 - 0.24*heat);               // glow sits low until struck
    const rad = flameH*(0.18 + 0.34*heat)*(0.92+0.16*breath+surge*0.45);
    function aura(dx, col, a){
      ctx.save(); ctx.translate(cx+dx, by); ctx.scale(0.60, 1.5);
      const g=ctx.createRadialGradient(0,0,0,0,0,rad);
      g.addColorStop(0, rgba(col,a)); g.addColorStop(.55, rgba(col,a*0.30)); g.addColorStop(1, rgba(col,0));
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,rad,0,6.283); ctx.fill(); ctx.restore();
    }
    const flick = 0.85 + 0.15*Math.sin(t*7.3) + 0.1*Math.sin(t*3.1);
    aura(-flameW*0.13*dxk, C.cyan,  (0.13+0.08*breath+surge*0.22)*flick*heatGlow);
    aura( flameW*0.13*dxk, C.ember, (0.16+0.09*breath+surge*0.28)*flick*heatGlow);
    aura( 0,               C.gold,  (0.12+0.07*breath+surge*0.32)*flick*heatGlow);
    ctx.restore();

    // ── fire: rising soft particles (the live heat) ──
    let want = (heat < 0.2) ? (Math.random()<0.45 ? 1 : 0) : Math.round(1 + heat*15);
    for(let s=0;s<want;s++) spawnFire(heat);
    ctx.save(); ctx.globalCompositeOperation="lighter";
    for(let i=fire.length-1;i>=0;i--){
      const p=fire[i];
      p.life-=p.decay;
      if(p.life<=0){ fire.splice(i,1); continue; }
      p.vy*=0.992;
      p.x += p.vx + Math.sin(t*p.wobS+p.wob)*p.drift;
      p.y += p.vy;
      const age=1-p.life;                                   // 0 young → 1 old
      const sideCol = mix(C.cyan, C.ember, p.side);
      let col = mix(mix(C.gold, sideCol, 0.45+0.55*age), C.ember, age*0.5);
      if(age<0.16) col = mix([255,255,235], col, age/0.16); // white-hot tip
      const rr = p.r*(0.5+0.9*p.life);
      const a  = Math.pow(p.life,1.5) * (0.12 + 0.16*heat) * dim;
      ctx.globalAlpha = a<0?0:(a>1?1:a);
      const spr = nearestSprite(col);
      ctx.drawImage(spr, p.x-rr, p.y-rr, rr*2, rr*2);
    }
    ctx.globalAlpha = 1;
    ctx.restore();

    // ── embers ──
    ctx.save(); ctx.globalCompositeOperation="lighter";
    for(let i=embers.length-1;i>=0;i--){
      const p=embers[i];
      p.x+=p.vx; p.y+=p.vy; p.vy+=0.006; p.life-=0.012;
      if(p.life<=0){ embers.splice(i,1); continue; }
      ctx.fillStyle=rgba(p.c, p.life*0.9);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
    if(state==="idle"){
      const cap = 14 + (hover*42|0);
      if(embers.length<cap && Math.random() < 0.10+0.5*hover) spawnEmber(false);
    }

    // ── posterior layer, drawn on the canvas IN FRONT of the logo ──
    ctx2.clearRect(0,0,W,H);
    if(post>0){
      const frozen = burnProg>=1;                            // burn-through has reached the logo edge → hold still
      if(!frozen) drawInference(ctx2, post, t);              // overlay shown while resolving + burning in

      // ── the posterior burns through, revealing the logo, and STOPS at the logo edge ──
      if(burnProg>0 && logoBox){
        const N=120, b=logoBox;
        // distance from a point inside the plate to its border along an angle (ray→box)
        const rayBox=(px,py,c,s)=>{ let tm=Infinity;
          if(c>0) tm=Math.min(tm,(b.x+b.w-px)/c); else if(c<0) tm=Math.min(tm,(b.x-px)/c);
          if(s>0) tm=Math.min(tm,(b.y+b.h-py)/s); else if(s<0) tm=Math.min(tm,(b.y-py)/s);
          return Math.max(0,tm); };
        const trace=(s,R)=>{ ctx2.beginPath();
          for(let i=0;i<=N;i++){ const ang=i/N*6.283, c=Math.cos(ang), si=Math.sin(ang);
            let rr=R*frontRadius(s,ang);
            rr=Math.min(rr, rayBox(s.x,s.y,c,si));             // clamp: never expand past the logo edge
            const x=s.x+c*rr, y=s.y+si*rr;
            i?ctx2.lineTo(x,y):ctx2.moveTo(x,y);} ctx2.closePath(); };
        const Rof=s=>{ const sp=(burnProg-s.start)/(1-s.start); return sp<=0?0:s.r0+smooth(sp)*(s.rMax-s.r0); };

        if(!frozen){
          // wipe the wider inference viz outside the plate as the burn ramps
          const wipe = smooth(Math.min(1, burnProg/0.5));
          ctx2.save(); ctx2.globalCompositeOperation="destination-out"; ctx2.globalAlpha=wipe;
          ctx2.beginPath(); ctx2.rect(0,0,W,H); ctx2.rect(b.x-1,b.y-1,b.w+2,b.h+2);
          ctx2.fill("evenodd"); ctx2.restore();

          // pass 1 — burn the holes (overlapping spots merge), revealing the logo
          ctx2.save(); ctx2.globalCompositeOperation="destination-out";
          for(const s of burnFronts){ const R=Rof(s); if(R<=0) continue;
            trace(s,R); ctx2.fill();
            ctx2.lineWidth=18; ctx2.strokeStyle="rgba(0,0,0,0.5)"; trace(s,R); ctx2.stroke();
          }
          ctx2.restore();
        }

        // pass 2 — glowing burn-through edges (held when frozen — no fade)
        ctx2.save(); ctx2.globalCompositeOperation="lighter";
        for(const s of burnFronts){ const R=Rof(s); if(R<=0) continue;
          const a = s.bright;
          trace(s,R);
          ctx2.lineWidth=16; ctx2.strokeStyle=rgba(C.flame,0.10*a); ctx2.stroke();
          ctx2.lineWidth=10; ctx2.strokeStyle=rgba(C.ember,0.16*a); ctx2.stroke();
          ctx2.lineWidth=6;  ctx2.strokeStyle=rgba(C.ember,0.50*a); ctx2.stroke();
          trace(s,R*0.985);
          ctx2.lineWidth=2.2; ctx2.strokeStyle=rgba(C.gold,0.72*a); ctx2.stroke();
          for(let i=0;i<N;i+=2){ const ang=i/N*6.283, d=frontHeat(s,ang); if(d<0.34) continue;
            const c=Math.cos(ang), si=Math.sin(ang);
            let rr=R*frontRadius(s,ang); rr=Math.min(rr, rayBox(s.x,s.y,c,si));
            const x=s.x+c*rr, y=s.y+si*rr, fl=0.55+0.45*Math.sin(t*16+i+s.bias*3);
            ctx2.fillStyle=rgba(mix(mix(C.ember,C.gold,d),[255,255,235],0.3),(0.4+0.55*d)*a*fl);
            ctx2.beginPath(); ctx2.arc(x,y,2+4*d,0,6.283); ctx2.fill();
          }
        }
        ctx2.restore();

        // pass 3 — re-erase interiors so the glow survives only on the merged OUTER edge
        ctx2.save(); ctx2.globalCompositeOperation="destination-out";
        for(const s of burnFronts){ const R=Rof(s); if(R<=0) continue;
          trace(s, Math.max(1, R-12)); ctx2.fill(); }
        ctx2.restore();

        // sparks shed from the active fronts (only while still travelling)
        if(!frozen) for(const s of burnFronts){ const sp=(burnProg-s.start)/(1-s.start); if(sp<=0||sp>0.96) continue;
          if(embers.length<EMBER_CAP && Math.random()<0.45){ const ang=Math.random()*6.283, c=Math.cos(ang), si=Math.sin(ang);
            let rr=Rof(s)*frontRadius(s,ang); rr=Math.min(rr, rayBox(s.x,s.y,c,si));
            embers.push({x:s.x+c*rr, y:s.y+si*rr,
              vx:c*0.5+(Math.random()-0.5)*0.5, vy:si*0.5-0.8,
              life:1, r:1.4+Math.random()*2.6, c:mix(C.flame,C.gold,Math.random())}); }
        }
      }
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
